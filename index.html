<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GitHub Finder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- HEADER -->
  <header class="navbar">
    <div class="left">
      <i class="fa-brands fa-github"></i>
      <h1 class="logo">GitHub Finder</h1>
    </div>

    <button class="btn">
      Favoris (<span id="bookmarkCount">0</span>)
    </button>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- SEARCH -->
    <section class="search">
      <input id="searchInput" type="text" placeholder="Rechercher un utilisateur...">
      <button id="searchBtn" class="btn-primary">Rechercher</button>
    </section>

    <!-- WELCOME -->
    <section id="welcomeState" class="welcome">
      <h2>Bienvenue 👋</h2>
      <p>Recherchez un utilisateur GitHub</p>
    </section>

    <!-- LOADING -->
    <section id="loadingState" class="loading hidden">
      <p>Chargement...</p>
    </section>

    <!-- ERROR -->
    <section id="errorState" class="error hidden"></section>

    <!-- PROFILE -->
    <section id="userProfile" class="profile hidden"></section>

    <!-- REPOS -->
    <section id="reposList" class="repos hidden"></section>

    <!-- FAVORITES -->
    <section class="favorites hidden">
      <h3>Favoris</h3>
      <div class="fav-list"></div>
    </section>

  </main>
  <script src="config.js"></script>  
  <script src="index.js"></script>

</body>
</html>
